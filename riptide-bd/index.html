<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riptide BD</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Riptide BD</h1>

  <input id="search" placeholder="Search products...">

  <div class="actions">
    🛒 <span id="cartCount">0</span> | ❤️ <span id="wishCount">0</span>
  </div>
</header>

<section class="filters">
  <button onclick="setFilter('all')">All</button>
  <button onclick="setFilter('Electronics')">Electronics</button>
  <button onclick="setFilter('Fashion')">Fashion</button>
  <button onclick="setFilter('Accessories')">Accessories</button>

  <input type="number" id="minPrice" placeholder="Min Price">
  <input type="number" id="maxPrice" placeholder="Max Price">
  <button onclick="priceFilter()">Apply</button>
</section>

<section id="products"></section>

<!-- PRODUCT MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span onclick="closeModal()" class="close">&times;</span>
    <div id="modalBody"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
